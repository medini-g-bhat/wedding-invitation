<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sampreeth & Medini Wedding</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      height: 100%;
      font-family: 'Josefin Sans', sans-serif;
      overflow-x: hidden;
      background-color: #fdfbf7;
    }

    .split-wrap {
      display: flex;
      width: 100%;
      height: 100%;
    }

    /* ── LEFT SECTION (Desktop) ── */
    .left {
      position: relative;
      width: 50%;
      height: 100%;
      background: url('image/WhatsApp Image 2026-02-21 at 10.56.32 PM.jpeg') no-repeat center center / cover;
      overflow: hidden;
    }

    /* Gradient overlay to make top text pop */
    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.3) 100%);
    }

    .left-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start; /* Moved to top */
      padding: 50px 60px;
      z-index: 5;
    }

    .left-name {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      color: #ffffff;
      line-height: 1.1;
      text-shadow: 0 2px 10px rgba(0,0,0,0.4);
      animation: fadeInDown 1.5s ease;
    }

    /* ── VERTICAL DIVIDER ── */
    .divider-line {
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #d4af37, transparent);
      flex-shrink: 0;
      z-index: 10;
    }

    /* ── RIGHT SECTION ── */
    .right {
      width: 50%;
      height: 100%;
      background: radial-gradient(circle at center, #ffffff 0%, #f7f3eb 100%);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .corner-decoration {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 1px solid #d4af37;
      opacity: 0.2;
    }
    .top-right { top: 30px; right: 30px; border-left: none; border-bottom: none; }
    .bottom-left { bottom: 30px; left: 30px; border-right: none; border-top: none; }

    .right-content {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 40px;
      max-width: 450px;
      animation: fadeInUp 1.5s ease;
    }

    .right-content h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 3.5rem;
      color: #9c7e2d;
      margin-bottom: 20px;
    }

    .right-content p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: #5a554a;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-block;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 18px 45px;
      border: 1px solid #d4af37;
      background: #fff;
      color: #9c7e2d;
      text-decoration: none;
      transition: all 0.4s ease;
    }

    .btn:hover {
      background: #d4af37;
      color: #fff;
      transform: translateY(-3px);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE OPTIMIZATION ── */
    @media (max-width: 768px) {
      body, html { overflow-y: auto; height: auto; }
      
      .split-wrap { 
        flex-direction: column; 
        height: auto;
      }

      .left { 
        width: 100%; 
        height: 75vh;
        background-position: center center;
      }

      .left-content {
        padding: 40px 20px;
        align-items: center; /* Center names on mobile top */
        width: 100%;
      }

      .left-name { 
        font-size: 2.8rem;
        text-align: center;
      }

      .divider-line { 
        width: 100%; 
        height: 1px; 
      }

      .right { 
        width: 100%; 
        min-height: 45vh; 
        padding: 60px 24px;
      }

      .btn {
        width: 100%;
        padding: 18px 0;
      }
    }
  </style>
</head>
<body>

<div class="split-wrap">
  <div class="left">
    <div class="left-content">
      <div class="left-name">Sampreeth &amp; Medini</div>
    </div>
  </div>

  <div class="divider-line"></div>

  <div class="right">
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>

    <div class="right-content">
      <h1>You Are Invited!</h1>
      <p>Join us as we celebrate our love and begin a beautiful new journey together.</p>
      <a href="main.html" class="btn">Join the Celebration</a>
    </div>
  </div>
</div>

</body>
</html>
