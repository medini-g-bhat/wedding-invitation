<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background-color: #ffffff; 
      color: #4a4a4a;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── TOP NAV BAR ── */
    .top-nav {
      background: #ffffff;
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(200,151,58,0.1);
    }

    .top-nav a {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(145deg, #bf953f, #9c7e2d); 
      color: #ffffff;
      text-decoration: none;
      padding: 12px 35px;
      border-radius: 50px;
      border: 1px solid #9c7e2d;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 20px rgba(156, 126, 45, 0.35);
    }

    .top-nav a:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 25px rgba(156, 126, 45, 0.5);
    }

    /* ── HERO SECTION ── */
    header.hero {
      position: relative;
      text-align: center;
      padding: 80px 20px 80px;
      background: #ffffff;
      color: #9c7e2d;
    }

    .header-bottom-bar { 
      position: absolute; bottom: 0; left: 0; right: 0; height: 4px; 
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent); 
    }

    header.hero h1 { font-family: 'Great Vibes', cursive; font-size: 4.5rem; color: #9c7e2d; margin-bottom: 10px; }
    header.hero p { font-size: 0.85rem; letter-spacing: 7px; text-transform: uppercase; color: #bca05a; }

    /* ── COLORED RSVP BOX ── */
    .rsvp-container {
      max-width: 600px;
      margin: -50px auto 80px;
      padding: 50px;
      /* Soft Champagne/Gold Gradient */
      background: linear-gradient(135deg, #fffdfa 0%, #fdf5e6 100%);
      border-radius: 20px;
      /* Elegant Gold Border */
      border: 2px solid rgba(200, 151, 58, 0.2);
      box-shadow: 0 25px 50px rgba(156, 126, 45, 0.15);
      position: relative;
      z-index: 10;
    }

    /* Decorative inner line for that 'Stationery' look */
    .rsvp-container::after {
      content: "";
      position: absolute;
      top: 15px; left: 15px; right: 15px; bottom: 15px;
      border: 1px solid rgba(200, 151, 58, 0.1);
      border-radius: 12px;
      pointer-events: none;
    }

    .rsvp-form-group { margin-bottom: 25px; text-align: left; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #9c7e2d; margin-bottom: 8px; font-weight: 600; }
    
    input, select {
      width: 100%;
      padding: 14px 15px;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 8px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1rem;
      background-color: #ffffff;
      transition: all 0.3s ease;
    }

    input:focus { outline: none; border-color: #9c7e2d; box-shadow: 0 0 8px rgba(156, 126, 45, 0.2); }

    .rsvp-button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #c8973a 0%, #9c7e2d 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(156, 126, 45, 0.3);
    }

    .rsvp-button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(156, 126, 45, 0.4); }

    footer { background: #ffffff; text-align: center; padding: 40px; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; color: #9c7e2d; border-top: 1px solid rgba(212,175,55,0.1); }
    footer span { color: #c8973a; }

    @media (max-width: 768px) {
      header.hero h1 { font-size: 3.2rem; }
      .rsvp-container { margin: 20px; padding: 35px 20px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="main.html">Home</a>
  <a href="events.html">Events</a>
  <a href="memories.html">Memories</a>
</nav>

<header class="hero">
  <h1>Will You Join Us?</h1>
  <p>Kindly RSVP by Nov 15</p>
  <div class="header-bottom-bar"></div>
</header>

<div class="rsvp-container">
  <form id="rsvpForm">
    <div class="rsvp-form-group">
      <label for="guest-name">Full Name</label>
      <input type="text" id="guest-name" name="guestName" placeholder="Enter your name" required>
    </div>

    <div class="rsvp-form-group">
      <label for="attending">Will you be attending?</label>
      <select id="attending" name="isAttending" required>
        <option value="" disabled selected>Please select...</option>
        <option value="yes">Yes, I'll be there!</option>
        <option value="no">Sorry, I can't make it</option>
      </select>
    </div>

    <div class="rsvp-form-group" id="guest-count-group">
      <label for="guests">Number of Guests</label>
      <input type="number" id="guests" name="guestCount" min="1" max="10" value="1">
    </div>

    <button type="submit" class="rsvp-button" id="submitBtn">Send Response</button>
  </form>

  <div id="message-box" style="display: none; text-align: center;">
    <div style="font-size: 3rem; margin-bottom: 15px;">✨</div>
    <h2 style="font-family: 'Great Vibes', cursive; font-size: 3rem; color: #9c7e2d;">Thank You!</h2>
    <p id="response-text" style="font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic;"></p>
    <br>
    <a href="main.html" style="color: #c8973a; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none; border-bottom: 1px solid #c8973a;">Return to Home</a>
  </div>
</div>

<footer>
  With <span>♥</span> from Sampreeth & Medini  ·  December 2026
</footer>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzK6mvjLIfnOcz5c1BkbtZ1c8pWyBvR5yt7gLN5U_5QzeCCy9y75YwsjNGWf-qjn6epLQ/exec'; 
  const form = document.getElementById('rsvpForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('message-box');
  const responseText = document.getElementById('response-text');
  const attendingSelect = document.getElementById('attending');
  const guestGroup = document.getElementById('guest-count-group');

  attendingSelect.addEventListener('change', () => {
    guestGroup.style.display = attendingSelect.value === 'no' ? 'none' : 'block';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";
    const name = document.getElementById('guest-name').value;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => {
      form.style.display = 'none';
      messageBox.style.display = 'block';
      responseText.innerText = attendingSelect.value === 'yes' ? 
        `We are so excited to celebrate with you, ${name}! See you in December!` : 
        `Thank you for letting us know, ${name}. We'll miss you!`;
    })
    .catch(error => {
      submitBtn.disabled = false;
      submitBtn.innerText = "Send Response";
      alert("Error sending RSVP. Please try again.");
    });
  });
</script>

</body>
</html>
