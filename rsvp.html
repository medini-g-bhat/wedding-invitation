<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background-color: #ffffff; 
      color: #4a4a4a;
      line-height: 1.6;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden; /* Prevent horizontal scroll */
    }

    /* ── TOP NAV BAR ── */
    .top-nav {
      background: #ffffff;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      padding: 20px;
      border-bottom: 1px solid rgba(200,151,58,0.1);
    }

    .top-nav a {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(145deg, #bf953f, #9c7e2d); 
      color: #ffffff;
      text-decoration: none;
      padding: 10px 25px;
      border-radius: 50px;
      border: 1px solid #9c7e2d;
      font-weight: 600;
      transition: all 0.4s ease;
      box-shadow: 0 4px 12px rgba(156, 126, 45, 0.25);
      white-space: nowrap;
    }

    /* ── HERO SECTION ── */
    header.hero {
      position: relative;
      text-align: center;
      padding: 60px 20px 80px;
      background: #ffffff;
      color: #9c7e2d;
    }

    .header-bottom-bar { 
      position: absolute; bottom: 0; left: 0; right: 0; height: 4px; 
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent); 
    }

    header.hero h1 { 
      font-family: 'Great Vibes', cursive; 
      font-size: 4rem; 
      color: #9c7e2d; 
      margin-bottom: 10px;
      line-height: 1.2;
    }

    header.hero p { 
      font-size: 0.8rem; 
      letter-spacing: 5px; 
      text-transform: uppercase; 
      color: #bca05a; 
    }

    /* ── COLORED RSVP BOX ── */
    .rsvp-container {
      max-width: 550px;
      width: 90%; /* Responsive width */
      margin: -40px auto 80px;
      padding: 40px;
      background: linear-gradient(135deg, #fffdfa 0%, #fdf5e6 100%);
      border-radius: 20px;
      border: 2px solid rgba(200, 151, 58, 0.2);
      box-shadow: 0 25px 50px rgba(156, 126, 45, 0.15);
      position: relative;
      z-index: 10;
    }

    .rsvp-container::after {
      content: "";
      position: absolute;
      top: 10px; left: 10px; right: 10px; bottom: 10px;
      border: 1px solid rgba(200, 151, 58, 0.08);
      border-radius: 12px;
      pointer-events: none;
    }

    .rsvp-form-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #9c7e2d; margin-bottom: 6px; font-weight: 600; }
    
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 8px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1rem;
      background-color: #ffffff;
    }

    .rsvp-button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #c8973a 0%, #9c7e2d 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    footer { text-align: center; padding: 40px 20px; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: #9c7e2d; }

    /* ── MOBILE ALIGNMENT FIXES ── */
    @media (max-width: 480px) {
      header.hero { padding: 40px 15px 60px; }
      header.hero h1 { font-size: 2.8rem; }
      header.hero p { font-size: 0.7rem; letter-spacing: 3px; }
      
      .rsvp-container {
        padding: 25px 20px; /* Reduced padding for more space */
        margin-top: -30px;
      }
      
      .top-nav { gap: 10px; padding: 15px 10px; }
      .top-nav a { padding: 8px 15px; font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="main.html">Home</a>
  <a href="events.html">Events</a>
  <a href="memories.html">Memories</a>
</nav>

<header class="hero">
  <h1>Will You Join Us?</h1>
  <p>Kindly RSVP by Nov 15</p>
  <div class="header-bottom-bar"></div>
</header>

<div class="rsvp-container">
  <form id="rsvpForm">
    <div class="rsvp-form-group">
      <label for="guest-name">Full Name</label>
      <input type="text" id="guest-name" name="guestName" placeholder="Enter your name" required>
    </div>

    <div class="rsvp-form-group">
      <label for="attending">Attendance</label>
      <select id="attending" name="isAttending" required>
        <option value="" disabled selected>Please select...</option>
        <option value="yes">Yes, I'll be there!</option>
        <option value="no">Sorry, I can't make it</option>
      </select>
    </div>

    <div class="rsvp-form-group" id="guest-count-group">
      <label for="guests">Number of Guests</label>
      <input type="number" id="guests" name="guestCount" min="1" max="10" value="1">
    </div>

    <button type="submit" class="rsvp-button" id="submitBtn">Send Response</button>
  </form>

  <div id="message-box" style="display: none; text-align: center;">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">✨</div>
    <h2 style="font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #9c7e2d;">Thank You!</h2>
    <p id="response-text" style="font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic;"></p>
    <br>
    <a href="main.html" style="color: #c8973a; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none; border-bottom: 1px solid #c8973a;">Return Home</a>
  </div>
</div>

<footer>
  With ♥ from Sampreeth & Medini
</footer>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzK6mvjLIfnOcz5c1BkbtZ1c8pWyBvR5yt7gLN5U_5QzeCCy9y75YwsjNGWf-qjn6epLQ/exec'; 
  const form = document.getElementById('rsvpForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('message-box');
  const responseText = document.getElementById('response-text');
  const attendingSelect = document.getElementById('attending');
  const guestGroup = document.getElementById('guest-count-group');

  attendingSelect.addEventListener('change', () => {
    guestGroup.style.display = attendingSelect.value === 'no' ? 'none' : 'block';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";
    const name = document.getElementById('guest-name').value;

    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(response => {
      form.style.display = 'none';
      messageBox.style.display = 'block';
      responseText.innerText = attendingSelect.value === 'yes' ? 
        `We are so excited to celebrate with you, ${name}!` : 
        `Thank you for letting us know, ${name}. We'll miss you!`;
    })
    .catch(error => {
      submitBtn.disabled = false;
      submitBtn.innerText = "Send Response";
    });
  });
</script>

</body>
</html>
