<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l-4 40 4 40 4-40z' fill='%23d4af37' fill-opacity='0.03'/%3E%3Cpath d='M0 40l40-4 40 4-40 4z' fill='%23d4af37' fill-opacity='0.03'/%3E%3C/svg%3E");
      color: #4a4a4a;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── UPDATED NAVIGATION (Centered Style) ── */
    .top-nav {
      background: #ffffff;
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(200,151,58,0.1);
    }

    .top-nav a {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(145deg, #bf953f, #9c7e2d); 
      color: #ffffff;
      text-decoration: none;
      padding: 12px 35px;
      border-radius: 50px;
      border: 1px solid #9c7e2d;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 20px rgba(156, 126, 45, 0.35);
      display: inline-block;
    }

    .top-nav a:hover {
      background: linear-gradient(145deg, #9c7e2d, #7a5f1d);
      border-color: #7a5f1d;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 25px rgba(156, 126, 45, 0.5);
    }

    /* ── UPDATED HERO (Consistent Style) ── */
    header.hero {
      position: relative;
      text-align: center;
      padding: 90px 20px 50px;
      background: radial-gradient(circle at 50% 50%, #ffffff 0%, #fdf9f0 100%);
      color: #9c7e2d;
      overflow: hidden;
    }

    header.hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 0% 100%, rgba(212,175,55,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
    }

    header.hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent);
    }

    .header-bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent);
      z-index: 2;
    }

    header.hero h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      color: #9c7e2d;
      text-shadow: 0 2px 10px rgba(0,0,0,0.05);
      margin-bottom: 12px;
      position: relative;
      z-index: 3;
      animation: floatText 4s ease-in-out infinite;
    }

    header.hero p {
      font-size: 0.8rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #bca05a;
      position: relative;
      z-index: 3;
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RSVP FORM SECTION ── */
    .rsvp-container {
      max-width: 600px;
      margin: 40px auto 80px;
      padding: 40px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.15);
      position: relative;
      z-index: 10;
    }

    .rsvp-form-group { margin-bottom: 25px; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #9c7e2d; margin-bottom: 8px; font-weight: 600; }
    
    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 8px;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      background-color: #fffcf7;
    }

    input:focus { outline: none; border-color: #c8973a; }

    .rsvp-button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #c8973a 0%, #9c7e2d 100%);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .rsvp-button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(200,151,58,0.3); }

    /* ── SUCCESS MESSAGES ── */
    #message-box { display: none; text-align: center; padding: 20px; animation: fadeIn 1s ease; }
    .msg-title { font-family: 'Great Vibes', cursive; font-size: 3rem; color: #9c7e2d; margin-bottom: 10px; }
    .msg-text { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-style: italic; color: #5a5a5a; }

    footer {
      background: #ffffff;
      text-align: center;
      padding: 40px 20px;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9c7e2d;
      border-top: 1px solid rgba(212,175,55,0.1);
    }
    footer span { color: #c8973a; }

    @media (max-width: 768px) {
      header.hero h1 { font-size: 2.8rem; }
      .top-nav { gap: 10px; padding: 20px 10px; }
      .top-nav a { padding: 10px 20px; font-size: 0.65rem; }
      .rsvp-container { margin: 20px; padding: 25px; }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="main.html">Home</a>
  <a href="events.html">Events</a>
  <a href="memories.html">Memories</a>
</nav>

<header class="hero">
  <h1>Will You Join Us?</h1>
  <p>Kindly RSVP by Nov 15</p>
  <div class="header-bottom-bar"></div>
</header>

<div class="rsvp-container">
  <form id="rsvpForm">
    <div class="rsvp-form-group">
      <label for="guest-name">Full Name</label>
      <input type="text" id="guest-name" name="guestName" placeholder="Enter your name" required>
    </div>

    <div class="rsvp-form-group">
      <label for="attending">Will you be attending?</label>
      <select id="attending" name="isAttending" required>
        <option value="" disabled selected>Please select...</option>
        <option value="yes">Yes, I'll be there!</option>
        <option value="no">Sorry, I can't make it</option>
      </select>
    </div>

    <div class="rsvp-form-group" id="guest-count-group">
      <label for="guests">Number of Guests</label>
      <input type="number" id="guests" name="guestCount" min="1" max="10" value="1">
    </div>

    <button type="submit" class="rsvp-button" id="submitBtn">Send Response</button>
  </form>

  <div id="message-box">
    <div id="success-icon" style="font-size: 3rem; margin-bottom: 15px;">✨</div>
    <div class="msg-title" id="response-title">Thank You!</div>
    <p class="msg-text" id="response-text"></p>
    <br>
    <a href="main.html" style="color: #c8973a; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; text-decoration: none;">Return to Home</a>
  </div>
</div>

<footer>
  With <span>♥</span> from Sampreeth & Medini  ·  December 2026
</footer>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzK6mvjLIfnOcz5c1BkbtZ1c8pWyBvR5yt7gLN5U_5QzeCCy9y75YwsjNGWf-qjn6epLQ/exec'; 
  const form = document.getElementById('rsvpForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('message-box');
  const responseTitle = document.getElementById('response-title');
  const responseText = document.getElementById('response-text');
  const attendingSelect = document.getElementById('attending');
  const guestGroup = document.getElementById('guest-count-group');

  attendingSelect.addEventListener('change', () => {
    guestGroup.style.display = attendingSelect.value === 'no' ? 'none' : 'block';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerText = "Sending...";

    const name = document.getElementById('guest-name').value;
    const status = attendingSelect.value;

    fetch(scriptURL, { 
      method: 'POST', 
      body: new FormData(form)
    })
    .then(response => {
      form.style.display = 'none';
      messageBox.style.display = 'block';

      if (status === 'yes') {
        responseTitle.innerText = "Joyful News!";
        responseText.innerText = `We are so excited to celebrate with you, ${name}! Your presence will make our day truly special. See you in December!`;
      } else {
        responseTitle.innerText = "We'll Miss You!";
        responseText.innerText = `Thank you for letting us know, ${name}. We are sorry you can't join us, but we'll be thinking of you!`;
      }
    })
    .catch(error => {
      console.error('Error!', error.message);
      submitBtn.disabled = false;
      submitBtn.innerText = "Send Response";
      alert("Something went wrong. Please try again or contact us directly!");
    });
  });
</script>

</body>
</html>
