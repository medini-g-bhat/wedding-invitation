<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Josefin Sans', sans-serif;
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l-4 40 4 40 4-40z' fill='%23d4af37' fill-opacity='0.03'/%3E%3Cpath d='M0 40l40-4 40 4-40 4z' fill='%23d4af37' fill-opacity='0.03'/%3E%3C/svg%3E");
      color: #4a4a4a;
      line-height: 1.6;
    }

    /* ── UPDATED NAVIGATION (Centered Style) ── */
    .top-nav {
      background: #ffffff;
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 30px 20px;
      border-bottom: 1px solid rgba(200,151,58,0.1);
    }

    .top-nav a {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(145deg, #bf953f, #9c7e2d); 
      color: #ffffff;
      text-decoration: none;
      padding: 12px 35px;
      border-radius: 50px;
      border: 1px solid #9c7e2d;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 6px 20px rgba(156, 126, 45, 0.35);
      display: inline-block;
    }

    .top-nav a:hover {
      background: linear-gradient(145deg, #9c7e2d, #7a5f1d);
      border-color: #7a5f1d;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 25px rgba(156, 126, 45, 0.5);
    }

    /* ── UPDATED HERO (Consistent with Home/Events) ── */
    header.hero {
      position: relative;
      text-align: center;
      padding: 90px 20px 50px;
      background: radial-gradient(circle at 50% 50%, #ffffff 0%, #fdf9f0 100%);
      color: #9c7e2d;
      overflow: hidden;
    }

    header.hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, rgba(212,175,55,0.1) 0%, transparent 55%),
        radial-gradient(ellipse at 0% 100%, rgba(212,175,55,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(212,175,55,0.05) 0%, transparent 50%);
    }

    header.hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent);
    }

    .header-bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #c8973a, #e2b96a, #c8973a, transparent);
      z-index: 2;
    }

    header.hero h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      color: #9c7e2d;
      text-shadow: 0 2px 10px rgba(0,0,0,0.05);
      margin-bottom: 12px;
      position: relative;
      z-index: 3;
      animation: floatText 4s ease-in-out infinite;
    }

    header.hero p {
      font-size: 0.8rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #bca05a;
      position: relative;
      z-index: 3;
      animation: fadeIn 1.5s ease forwards;
      opacity: 0;
    }

    @keyframes floatText {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── GALLERY GRID ── */
    .gallery-container {
      max-width: 1200px;
      margin: 60px auto 100px;
      padding: 0 20px;
      columns: 3 300px;
      column-gap: 20px;
    }

    .gallery-item {
      display: inline-block;
      width: 100%;
      margin-bottom: 20px;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 30px rgba(212,175,55,0.08);
      border: 1px solid rgba(212,175,55,0.15);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s ease;
    }

    .gallery-item:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(212,175,55,0.2);
      border-color: #c8973a;
    }

    .gallery-item:hover img {
      transform: scale(1.05);
    }

    .photo-caption {
      padding: 15px;
      background: #fff;
      text-align: center;
      border-top: 1px solid rgba(212,175,55,0.05);
    }

    .photo-caption h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: #9c7e2d;
      font-style: italic;
    }

    /* ── FOOTER ── */
    footer {
      background: #ffffff;
      text-align: center;
      padding: 40px 20px;
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9c7e2d;
      border-top: 1px solid rgba(212,175,55,0.1);
    }
    footer span { color: #c8973a; }

    @media (max-width: 768px) {
      header.hero h1 { font-size: 2.8rem; }
      .top-nav { gap: 10px; padding: 20px 10px; }
      .top-nav a { padding: 10px 20px; font-size: 0.65rem; }
      .gallery-container { columns: 1; }
    }
  </style>
</head>
